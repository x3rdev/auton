[platformio]
src_dir = .

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
build_src_filter = 
    +<camera/src/>
    ; -<control/>
    ; -<.pio/>

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
build_src_filter = 
    +<control/src/>
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0